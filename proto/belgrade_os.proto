syntax = "proto3";

package belgrade_os;

option go_package = "belgrade-os/gateway/gen;belgrade_os";

// ─── Core workflow ────────────────────────────────────────────────────────────

// Dropped by Edge Gateway into Redis Stream "tasks:inbound"
message Task {
  string task_id       = 1;  // UUID v4
  string user_id       = 2;  // resolved from JWT sub claim
  string prompt        = 3;
  int64  created_at_ms = 4;  // Unix epoch milliseconds
  string trace_id      = 5;  // propagated across all 5 services for distributed tracing
}

// MCP tool definition — namespaced by Capability Bridge (e.g. "shopping:add_item")
message Tool {
  string name              = 1;
  string description       = 2;
  string input_schema_json = 3;  // JSON Schema object serialised as a string
  string app_id            = 4;  // origin app (e.g. "shopping")
}

// Tool call: Inference Controller → Redis Stream "tasks:tool_calls" → Resource Runner
message ToolCall {
  string call_id    = 1;  // UUID v4, unique per invocation
  string task_id    = 2;  // parent Task.task_id
  string tool_name  = 3;  // namespaced: "shopping:add_item"
  string input_json = 4;  // JSON object matching Tool.input_schema_json
  string trace_id   = 5;  // propagated from Task.trace_id for distributed tracing
  string user_id    = 6;  // propagated from Task.user_id
  string tenant_id  = 7;  // resolved by Inference Controller
}

// Tool result: Resource Runner → Redis Stream "tasks:tool_results" → Inference Controller
message ToolResult {
  string call_id     = 1;
  string task_id     = 2;
  bool   success     = 3;
  string output_json = 4;  // non-empty on success=true
  string error       = 5;  // non-empty on success=false
  int64  duration_ms = 6;  // wall-clock execution time, used by circuit-breaker and observability
  string user_id     = 7;
  string tenant_id   = 8;
}

// ─── Streaming ────────────────────────────────────────────────────────────────

// Inference Controller → Redis Pub/Sub "sse:{task_id}" → Gateway → browser SSE
message ThoughtEvent {
  string           task_id  = 1;
  string           user_id  = 2;
  ThoughtEventType type     = 3;
  string           content  = 4;
  string           trace_id = 5;  // propagated from Task.trace_id for distributed tracing
}

enum ThoughtEventType {
  THOUGHT_EVENT_TYPE_UNSPECIFIED = 0;
  THINKING                       = 1;
  TOOL_USE                       = 2;
  RESPONSE_CHUNK                 = 3;
  DONE                           = 4;
  ERROR                          = 5;
}

// ─── Capability Bridge ────────────────────────────────────────────────────────

// Resource Runner → Capability Bridge when an app is loaded or reloaded
message AppToolsRegistration {
  string        app_id = 1;
  repeated Tool tools  = 2;
}

// Capability Bridge → Inference Controller in response to a tool-list query
message ToolListResponse {
  repeated Tool tools = 1;
}

// ─── Resource Runner ──────────────────────────────────────────────────────────

// Stored in Redis key "lease:{worker_id}" during tool execution
message WorkerLease {
  string worker_id     = 1;
  string task_id       = 2;
  string call_id       = 3;
  int64  leased_at_ms  = 4;
  int64  expires_at_ms = 5;
}

// ─── Notification Service ─────────────────────────────────────────────────────────

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_LOW    = 1;
  NOTIFICATION_NORMAL = 2;
  NOTIFICATION_HIGH   = 3;
}

// SDK → Redis Stream "tasks:notifications" → Notification Service
message NotificationRequest {
  string               trace_id  = 1;  // propagated from the originating Task
  string               app_id    = 2;  // origin app (e.g. "shopping")
  string               user_id   = 3;  // propagated from AppContext
  string               title     = 4;
  string               body      = 5;
  NotificationPriority priority  = 6;
  string               driver    = 7;  // "ntfy", "firebase", etc. — stamped by platform
  repeated string      tags      = 8;  // ntfy tags, e.g. ["shopping_cart", "warning"]
  string               click_url = 9;  // optional URL to open when notification is clicked
}

// ─── Vault Service ────────────────────────────────────────────────────────────

// App → Redis Stream "tasks:vault_ops" → Vault Service
message VaultOperation {
  enum OpType {
    OP_TYPE_UNSPECIFIED = 0;
    WRITE  = 1;
    DELETE = 2;
  }
  string trace_id = 1;
  string app_id   = 2;
  OpType op       = 3;
  string path     = 4; // relative to vault root
  bytes  content  = 5; // for WRITE
}
