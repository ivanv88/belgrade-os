services:
  db:
    image: postgres:15-alpine
    container_name: belgrade-db
    restart: always
    environment:
      # These variables will be pulled from your .env file
      POSTGRES_USER: laurent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: belgrade_os
    ports:
      - "5432:5432"
    volumes:
      # Maps the database files to your local folder for persistence
      - ./data/postgres:/var/lib/postgresql/data

  couchdb:
    image: couchdb:3
    container_name: belgrade-couchdb
    restart: always
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    ports:
      - "5984:5984"
    volumes:
      - ./data/couchdb:/opt/couchdb/data
    labels:
      beg-os.managed: "true"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    env_file: .env
    depends_on:
      - db

  # Optional: Admin interface to view your data via browser (uncomment to use)
