services:
  db:
    image: postgres:15-alpine
    container_name: beg-os-db
    restart: always
    environment:
      POSTGRES_USER: laurent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: belgrade_os
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - beg-os-network

  redis:
    image: redis:7-alpine
    container_name: beg-os-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - beg-os-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: beg-os-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - db
    networks:
      - beg-os-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]
  ...
  networks:
  beg-os-network:
    name: beg-os-network
    driver: bridge

  # Optional: Admin interface to view your data via browser (uncomment to use)
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: beg-os-pgadmin
  #   restart: always
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: laurent@example.com
  #     PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD}
  #   ports:
  #     - "8080:80"
  #   networks:
  #     - beg-os-network

networks:
  beg-os-network:
    driver: bridge
